<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz, les bases de JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="carte">
    <header class="entete">
      <span id="progression">Question 1 / 10</span>
      <span id="minuteur">20</span>
    </header>

    <h2 id="question"></h2>

    <div id="reponses" class="reponses"></div>

    <button id="suivant" class="bouton" hidden>Question suivante</button>

    <div id="fin" class="fin" hidden>
      <h2>Quiz terminé</h2>
      <p id="score-final"></p>
      <button id="recommencer" class="bouton">Recommencer</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
